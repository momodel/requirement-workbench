<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requirement Workbench Stages</title>
  <style>
    :root {
      --bg: #eef2ec;
      --paper: rgba(252, 253, 249, 0.94);
      --panel: rgba(255, 255, 252, 0.9);
      --line: rgba(52, 72, 62, 0.12);
      --ink: #18211b;
      --muted: #647067;
      --accent: #2d6a4f;
      --accent-2: #c35f2d;
      --warn: #b38a2f;
      --danger: #a33f32;
      --shadow: 0 18px 44px rgba(29, 44, 35, 0.12);
      --r-xl: 28px;
      --r-lg: 22px;
      --r-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(circle at 10% 10%, rgba(45, 106, 79, 0.1), transparent 25%),
        radial-gradient(circle at 90% 15%, rgba(195, 95, 45, 0.08), transparent 24%),
        linear-gradient(135deg, #e8eee6 0%, #f4f6f1 45%, #e6ebe7 100%);
      background-size: 26px 26px, 26px 26px, auto, auto, auto;
    }

    .shell {
      max-width: 1680px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 20px;
      margin-bottom: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(195, 95, 45, 0.12);
    }

    h1, h2, h3, p { margin: 0; }

    .brand h1 {
      margin-top: 6px;
      font-size: 25px;
      line-height: 1.05;
    }

    .brand p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      max-width: 64ch;
    }

    .pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      color: #415246;
      white-space: nowrap;
    }

    .pill.strong {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .frame {
      display: grid;
      grid-template-columns: clamp(260px, 20vw, 320px) minmax(0, 1.45fr) clamp(280px, 24vw, 360px);
      gap: 18px;
      min-height: 860px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 16%);
      pointer-events: none;
    }

    .panel-inner {
      padding: 18px;
      position: relative;
      z-index: 1;
    }

    .section + .section { margin-top: 16px; }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-title h2,
    .section-title h3 {
      font-size: 16px;
      margin: 0;
    }

    .badge {
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(45, 106, 79, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .card,
    .item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: rgba(255, 255, 255, 0.76);
    }

    .card + .card,
    .item + .item {
      margin-top: 10px;
    }

    .subtle {
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .source-top,
    .plan-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      padding: 7px 10px;
      border-radius: 999px;
      background: #f6f7f3;
      border: 1px solid rgba(52, 72, 62, 0.1);
      font-size: 12px;
      color: #486052;
    }

    .tag.strong {
      background: rgba(45, 106, 79, 0.92);
      color: white;
      border-color: transparent;
    }

    .chat {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: linear-gradient(180deg, rgba(251, 252, 248, 0.98), rgba(247, 250, 245, 0.92));
    }

    .chat-head {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, rgba(45, 106, 79, 0.1), rgba(195, 95, 45, 0.06) 48%, transparent 80%);
    }

    .chat-head h2 {
      font-size: 28px;
      line-height: 1.06;
      margin: 8px 0;
    }

    .chat-head p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .stages {
      display: flex;
      gap: 10px;
      overflow: auto;
      margin-top: 16px;
    }

    .stage {
      min-width: 132px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .stage small {
      display: block;
      margin-bottom: 5px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stage strong { font-size: 13px; }

    .stage.active {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .stage.active small { color: rgba(255, 255, 255, 0.76); }

    .messages {
      min-width: 0;
      padding: 18px 20px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .bubble {
      max-width: min(92%, 760px);
      padding: 15px 16px;
      border-radius: 20px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.68;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .bubble.user {
      margin-left: auto;
      background: #fffdf8;
      border-color: rgba(97, 93, 77, 0.16);
      border-bottom-right-radius: 8px;
    }

    .bubble.ai {
      background: rgba(255, 255, 255, 0.88);
      border-color: var(--line);
      border-bottom-left-radius: 8px;
    }

    .bubble.highlight {
      background: rgba(45, 106, 79, 0.08);
      border-color: rgba(45, 106, 79, 0.2);
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .composer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      background: rgba(250, 252, 248, 0.94);
    }

    .composer-box {
      border: 1px solid rgba(52, 72, 62, 0.12);
      background: white;
      border-radius: 22px;
      padding: 14px 16px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid rgba(89, 75, 57, 0.12);
      background: #f3f5ef;
      color: #4d5f53;
    }

    .btn.primary {
      background: var(--accent-2);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(195, 95, 45, 0.2);
    }

    .ok { background: rgba(45, 106, 79, 0.08); }
    .warn { background: rgba(195, 95, 45, 0.08); }

    .todo.high::before,
    .todo.medium::before,
    .todo.low::before {
      content: "";
      display: block;
      width: 42px;
      height: 4px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .todo.high::before { background: var(--danger); }
    .todo.medium::before { background: var(--warn); }
    .todo.low::before { background: var(--accent); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
    }

    .metric strong {
      display: block;
      margin-bottom: 4px;
      font-size: 22px;
    }

    .metric span {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 1360px) {
      .frame {
        grid-template-columns: 250px minmax(0, 1fr) 280px;
      }
    }

    @media (max-width: 980px) {
      .shell { padding: 16px; }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .pills { justify-content: flex-start; }
      .frame {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>

      const stageTabs = stages.map((item, i) => `<div class="stage ${i === index ? 'active' : ''}"><small>Stage 0${i + 1}</small><strong>${item.title}</strong></div>`).join('');

                    <span class="btn primary">推进到下一阶段</span>

                </div>
              </div>
            </main>
            <aside class="panel">
              <div class="panel-inner">
                <div class="eyebrow"><span class="dot"></span>project cockpit</div>
                <div class="section">
                  <div class="section-title"><h3>阶段产物</h3><span class="badge">${s.rightBlocks.length}</span></div>
                  ${rightBlocks}
                </div>
                <div class="section">
                  <div class="section-title"><h3>待处理</h3><span class="badge">${s.todos.length}</span></div>
                  ${todos}
                </div>
                <div class="section">
                  <div class="section-title"><h3>输出</h3><span class="badge">${s.plan.length}</span></div>
                  ${plan}
                  <div class="metrics">${metrics}</div>
                </div>
              </div>
            </aside>
          </div>
        </div>`;
      document.title = `Stage ${index + 1} - ${s.title}`;
    }

    window.renderStage = render;
    render(2);
  </script>
